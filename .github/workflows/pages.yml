name: Publicar no GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - name: Build (caminhos relativos para GitHub Pages)
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BASE_PATH: ./

      - name: PWA — URL absoluta (ecrã principal PC/iOS)
        run: node scripts/patch-pwa.mjs
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

      - name: Verificar que o build compilou
        run: |
          if grep -q 'src/main.jsx' dist/index.html; then
            echo "ERRO: index.html ainda aponta para codigo fonte."
            exit 1
          fi
          grep -q './assets/' dist/index.html || (echo "AVISO: assets" && cat dist/index.html)
          grep -q 'github.io' dist/manifest.webmanifest || (echo "ERRO: manifest sem URL absoluta" && exit 1)
          echo "Build OK"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: publicar
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
